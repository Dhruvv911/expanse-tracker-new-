<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>💰 Expense Tracker</h2>

  <div class="dashboard">
    <div class="box">Today ₹<span id="today">0</span></div>
    <div class="box">Total ₹<span id="total">0</span></div>
    <div class="box">Left ₹<span id="left">5000</span></div>
  </div>

  <div class="card">
    <input type="number" id="amount" placeholder="Enter Amount">
    <select id="category">
      <option>Food</option>
      <option>Travel</option>
      <option>Recharge</option>
    </select>

    <button onclick="addExpense()">Add Expense</button>
    <button onclick="startVoice()">🎤 Speak</button>
  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>

  <div class="card" id="analytics"></div>

</div>

<script src="script.js"></script>
</body>
</html>
